# Dashboard service config
# Root Directory: EMPTY (not set) — deploys full repo so main.py is available
# Start Command: set manually in Railway UI to:
#   gunicorn dashboard.app:app --bind 0.0.0.0:$PORT --workers 2

[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3